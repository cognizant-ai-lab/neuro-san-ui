# ================================================================================
# Test Workflow
# ================================================================================
# Purpose: Run comprehensive code quality checks and unit tests
#
# Trigger Scenarios:
# - Called by orchestrator workflow (automatic flow)
# - Manual trigger: Allows testing any arbitrary version/branch
# ================================================================================

# Note: this is mostly copy-pasta from the same Action in neuro-ui :thumbsdown:
# See: https://leaf-ai.atlassian.net/browse/UN-3573

name: Test

on:
    # Allow manual workflow dispatch
    workflow_dispatch:
        inputs:
            revision:
                description: "Git ref (tag/branch/SHA) to checkout"
                required: false
                type: string
    # Allow being called by other workflows
    workflow_call:
        inputs:
            revision:
                required: false
                type: string

env:
    # AWS info needed to push the image to ECR
    AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
    # and the nodejs version which is a repo-level variable
    NODEJS_VERSION: ${{ vars.NODEJS_VERSION }}

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              # v6.0.2
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.revision || github.ref }}

            - name: Setup Node.js and install dependencies
              # build-common 1.0.6
              uses: cognizant-ai-lab/build-common/actions/setup-node-env@e5f749a7ba5de8bb8106cb172e89f21ca581a697
              with:
                  # Pinned to 22.17.1 to avoid 22.18+ regression (nodejs/node#59364)
                  node-version: "22.17.1"
                  clean-install: "true"

            - name: Install prerequisites for code generation
              run: |
                  sudo apt-get update -y > /dev/null
                  sudo apt-get install -y --no-install-recommends --no-install-suggests \
                    bash shellcheck > /dev/null

            - name: Generate OpenAPI types
              run: yarn generate

            - name: Run ESLint
              id: eslint
              if: success() || failure()
              run: |
                  ./build_scripts/run_eslint.sh

            - name: Run ShellCheck
              id: shellcheck
              if: success() || failure()
              run: |
                  ./build_scripts/run_shellcheck.sh

            - name: Run Prettier (formatting check)
              id: prettier
              if: success() || failure()
              run: |
                  yarn check-format --version
                  yarn check-format

            - name: Run knip (unused dependencies/exports check)
              id: knip
              if: success() || failure()
              run: |
                  yarn knip --version
                  yarn knip

            - name: Lint Dockerfiles (hadolint)
              uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
              id: hadolint
              if: success() || failure()
              with:
                  dockerfile: apps/main/Dockerfile
                  recursive: true
                  failure-threshold: info

            - name: Docker build check
              id: dockerbuild
              if: success() || failure()
              run: |
                  docker build --quiet --check --file apps/main/Dockerfile . > /dev/null

            - name: Run TypeScript compilation
              id: tsc
              if: success() || failure()
              run: |
                  yarn tsc --version
                  yarn tsc

            - name: Run unit tests
              id: unit
              if: success() || failure()
              run: |
                  node --version
                  yarn test --version
                  yarn test
