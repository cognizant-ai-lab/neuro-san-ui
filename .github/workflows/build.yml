# ================================================================================
# Build Workflow
# ================================================================================
# Purpose: Build Docker image and push to Amazon ECR
#
# Trigger Scenarios:
# - Called by orchestrator workflow (automatic flow)
# - Manual trigger: Allows building any arbitrary version/branch
# ================================================================================

# Note: this is mostly copy-pasta from the same Action in neuro-ui :thumbsdown:
# See: https://leaf-ai.atlassian.net/browse/UN-3573

name: Build

on:
    # Allow manual workflow dispatch
    workflow_dispatch:
        inputs:
            revision:
                description: "Git ref (tag/branch/SHA) to checkout"
                required: false
                type: string
            DISPLAY_VERSION:
                description: "Override display version for image tag"
                required: false
                type: string
    # Allow being called by other workflows
    workflow_call:
        inputs:
            revision:
                required: false
                type: string
            DISPLAY_VERSION:
                required: true
                type: string
        outputs:
            image_tag:
                description: "The image tag that was pushed to ECR"
                value: ${{ jobs.build.outputs.image_tag }}

env:
    # AWS info needed to push the image to ECR
    AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
    ECR_REGISTRY: ${{ vars.ECR_REGISTRY || '123456789012.dkr.ecr.us-east-1.amazonaws.com' }}
    ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'neuro-san/neuro-san-ui' }}
    # and the Node.js version which is a repo-level variable
    NODEJS_VERSION: ${{ vars.NODEJS_VERSION }}

permissions:
    id-token: write
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            image_tag: ${{ inputs.DISPLAY_VERSION }}
        steps:
            - name: Checkout repository
              # v6.0.2
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.revision || github.ref }}

            - name: Setup Node.js and install dependencies
              # build-common 1.0.7
              uses: cognizant-ai-lab/build-common/actions/setup-node-env@3ead7f681f92044709ffc3a533f41c3f48230cfd
              with:
                  node-version: ${{ env.NODEJS_VERSION }}
                  clean-install: "true"

            - name: Generate TypeScript API stubs
              run: yarn generate

            - name: Authenticate to AWS and login to ECR
              # build-common 1.0.7
              uses: cognizant-ai-lab/build-common/actions/aws-ecr-auth@3ead7f681f92044709ffc3a533f41c3f48230cfd
              with:
                  aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
                  aws-role-name: ${{ vars.AWS_ROLE_NAME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Build and push Docker image to ECR
              # build-common 1.0.7
              uses: cognizant-ai-lab/build-common/actions/docker-buildx-push@3ead7f681f92044709ffc3a533f41c3f48230cfd
              with:
                  context: .
                  dockerfile: apps/main/Dockerfile
                  tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ inputs.DISPLAY_VERSION }}
                  build-args: |
                      NODEJS_VERSION=${{ env.NODEJS_VERSION }}
                      NEXT_PUBLIC_NEURO_SAN_UI_VERSION=${{ inputs.DISPLAY_VERSION }}
                  quiet: "true"
